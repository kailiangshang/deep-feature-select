base_model: GSG-Softmax+IPCAE
base_params:
  embedding_dim_encoder: 32
  embedding_dim_gate: 16
  initial_temperature: 10.0
  final_temperature: 0.01
  k: 20
  sparse_loss_weight: 1.0

datasets:
  - Lung
  - pancreas

seeds: [0, 1, 2]

training:
  epochs: 1000
  device: cpu

classifier:
  hidden_dim: 128

hyperparameters:
  learning_rate:
    param: lr
    values: [1e-5, 5e-5, 1e-4, 5e-4, 1e-3]

  batch_size:
    param: batch_size
    values: [64, 128, 256, 512, 1024]

  initial_temperature:
    param: initial_temperature
    values: [1.0, 5.0, 10.0, 20.0, 50.0]

  embedding_dim_encoder:
    param: embedding_dim_encoder
    values: [8, 16, 32, 64, 128]

  embedding_dim_gate:
    param: embedding_dim_gate
    values: [4, 8, 16, 32, 64]

results_dir: exp/results/hyperparameter
